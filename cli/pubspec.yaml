name: cli
description: The LocalSend command-line interface — a headless receiver (and sender stub).
version: 1.0.0
publish_to: "none"

environment:
  sdk: ^3.5.0

dependencies:
  args: ^2.4.2
  # Same version the app uses, so generated certs/fingerprints are byte-compatible.
  basic_utils: 5.7.0
  common:
    path: ../common
  dart_mappable: ^4.6.0
  path: ^1.9.0
  uuid: ^4.5.1

dev_dependencies:
  lints: ^2.0.0
  test: ^1.21.0
