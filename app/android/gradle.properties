org.gradle.jvmargs=-Xmx4g -Xms1g
android.useAndroidX=true
android.enableJetifier=true
# The Kotlin incremental compiler fails with "this and base files have different
# roots" when the project and the Pub cache live on different Windows drives
# (project on D:, Pub cache on C:). Disabling incremental Kotlin compilation
# sidesteps the cross-drive path relativization. Full compilation is unaffected.
kotlin.incremental=false
